# Build + publish the Solo OS desktop app.
#
# Trigger: push a tag like v1.0.0 (or run manually from the Actions tab).
# Output: a DRAFT GitHub release with the mac DMG/zip + Windows installer.
#         Review it, then click Publish - members' apps only see PUBLISHED
#         releases, so nothing ships until you publish the draft.
#
# Signing is optional and driven by repo secrets. With no secrets configured
# the workflow still produces working (unsigned) builds:
#   mac:  MAC_CERT_P12_BASE64, MAC_CERT_PASSWORD  (Developer ID Application cert)
#         APPLE_API_KEY_B64, APPLE_API_KEY_ID, APPLE_API_ISSUER  (notarization)
#   win:  WIN_CERT_PFX_BASE64, WIN_CERT_PASSWORD  (code signing cert)

name: desktop-release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write # create the draft release + upload artifacts

jobs:
  mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix server ci
          npm --prefix frontend ci

      - name: Configure mac signing (only when secrets exist)
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [ -n "$MAC_CERT_P12_BASE64" ]; then
            echo "$MAC_CERT_P12_BASE64" | base64 -d > "$RUNNER_TEMP/mac-cert.p12"
            echo "CSC_LINK=$RUNNER_TEMP/mac-cert.p12" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=$MAC_CERT_PASSWORD" >> "$GITHUB_ENV"
            echo "mac signing: ON"
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            echo "mac signing: OFF (no MAC_CERT_P12_BASE64 secret)"
          fi
          if [ -n "$APPLE_API_KEY_B64" ]; then
            echo "$APPLE_API_KEY_B64" | base64 -d > "$RUNNER_TEMP/apple-api-key.p8"
            echo "APPLE_API_KEY=$RUNNER_TEMP/apple-api-key.p8" >> "$GITHUB_ENV"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"
            echo "NOTARIZE=true" >> "$GITHUB_ENV"
            echo "mac notarization: ON"
          else
            echo "NOTARIZE=false" >> "$GITHUB_ENV"
            echo "mac notarization: OFF (no APPLE_API_KEY_B64 secret)"
          fi

      - name: Build + publish (draft release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run desktop:prepare
          npx electron-builder --mac --publish always --config.mac.notarize=$NOTARIZE

      - name: Self-test the packaged app
        run: |
          APP="$(ls -d desktop/release/mac-arm64/*.app | head -1)"
          SOLO_OS_VAULT="$RUNNER_TEMP/selftest-vault" "$APP/Contents/MacOS/Solo OS" --self-test

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix server ci
          npm --prefix frontend ci

      - name: Configure Windows signing (only when secrets exist)
        shell: bash
        env:
          WIN_CERT_PFX_BASE64: ${{ secrets.WIN_CERT_PFX_BASE64 }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: |
          if [ -n "$WIN_CERT_PFX_BASE64" ]; then
            echo "$WIN_CERT_PFX_BASE64" | base64 -d > "$RUNNER_TEMP/win-cert.pfx"
            echo "CSC_LINK=$RUNNER_TEMP/win-cert.pfx" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=$WIN_CERT_PASSWORD" >> "$GITHUB_ENV"
            echo "win signing: ON"
          else
            echo "win signing: OFF (no WIN_CERT_PFX_BASE64 secret - members will see a SmartScreen warning)"
          fi

      - name: Build + publish (draft release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run desktop:prepare
          npx electron-builder --win --publish always

      - name: Self-test the packaged app
        shell: bash
        run: |
          APP="desktop/release/win-unpacked/Solo OS.exe"
          SOLO_OS_VAULT="$RUNNER_TEMP\\selftest-vault" "$APP" --self-test
